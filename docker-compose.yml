version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — banco espelho dos dados extraídos do TINUS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: legado-mirror-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:        ${POSTGRES_USER}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD}
      POSTGRES_DB:          ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO — object store S3-compatível para receber os JSONs do Java 7
  #
  # Console web: http://localhost:9001  (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
  # API S3:      http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: legado-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"    # API S3 — usada pelo Java 7 e Spring Boot
      - "${MINIO_CONSOLE_PORT}:9001" # Console web — administração
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MinIO Init — cria o bucket automaticamente na primeira subida
  # Roda uma única vez e encerra (não é um serviço permanente)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: legado-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        mc anonymous set download local/${MINIO_BUCKET} &&
        echo 'Bucket ${MINIO_BUCKET} criado com sucesso.' &&
        exit 0
      "
    restart: "no"
